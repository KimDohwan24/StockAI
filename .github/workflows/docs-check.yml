name: Docs Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - '**/*.md'
      - '.github/workflows/docs-check.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check AGENT.md / SKILL.md naming convention
        run: |
          echo "🔍 Checking markdown file naming convention..."
          
          # Check for old AGENTS.md (should be AGENT.md)
          if find . -name "AGENTS.md" -not -path "*/node_modules/*" -not -path "*/venv/*" -not -path "*/.git/*" | grep -q .; then
            echo "❌ Found AGENTS.md (old naming). Please rename to AGENT.md"
            find . -name "AGENTS.md" -not -path "*/node_modules/*" -not -path "*/venv/*" -not -path "*/.git/*"
            exit 1
          fi
          
          echo "✅ All markdown files follow naming convention"

      - name: Check AGENT.md exists in modules
        run: |
          echo "🔍 Checking required AGENT.md files..."
          
          required=(
            "./FE/stock-frontend/AGENT.md"
            "./BE/stock-ai-server/AGENT.md"
            "./BE/stock-core-api/AGENT.md"
          )
          
          missing=0
          for file in "${required[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing: $file"
              missing=1
            else
              echo "✅ Found: $file"
            fi
          done
          
          if [ $missing -eq 1 ]; then
            echo "Some required AGENT.md files are missing!"
            exit 1
          fi

      - name: Check SKILL.md exists in modules
        run: |
          echo "🔍 Checking required SKILL.md files..."
          
          required=(
            "./FE/stock-frontend/SKILL.md"
            "./BE/stock-ai-server/SKILL.md"
            "./BE/stock-core-api/SKILL.md"
          )
          
          missing=0
          for file in "${required[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing: $file"
              missing=1
            else
              echo "✅ Found: $file"
            fi
          done
          
          if [ $missing -eq 1 ]; then
            echo "Some required SKILL.md files are missing!"
            exit 1
          fi

      - name: PR Comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📋 Documentation Check Failed
              
              AGENT.md 또는 SKILL.md 파일 규칙 위반을 발견했습니다.
              
              ### 확인 필요 사항:
              1. **파일명 통일**: AGENTS.md → AGENT.md
              2. **필수 파일 존재**:
                 - FE/stock-frontend/AGENT.md, SKILL.md
                 - BE/stock-ai-server/AGENT.md, SKILL.md
                 - BE/stock-core-api/AGENT.md, SKILL.md
              
              자세한 내용은 [프로젝트 문서 규칙](../../AGENT.md)을 참조하세요.`
            })
