name: FastAPI CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'BE/stock-ai-server/**'
      - '.github/workflows/fastapi-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'BE/stock-ai-server/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./BE/stock-ai-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: ./BE/stock-ai-server/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/1
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          MODEL_NAME: snunlp/KR-FinBert-SC
          MODEL_DEVICE: cpu
          DEBUG: true

      # TODO: 추후 Option C (Docker Build + Push)
      # - name: Build Docker image
      #   run: docker build -t ghcr.io/${{ github.repository }}/stock-ai-server:${{ github.sha }} .

