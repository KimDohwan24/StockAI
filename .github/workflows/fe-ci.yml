name: FE CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'FE/**'
      - '.github/workflows/fe-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'FE/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./FE/stock-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./FE/stock-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      # TODO: 배포 단계 (Option C)
      # - name: Deploy to Vercel
      #   uses: vercel/action-deploy@v1
