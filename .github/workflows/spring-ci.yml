name: Spring Boot CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'BE/stock-core-api/**'
      - '.github/workflows/spring-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'BE/stock-core-api/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./BE/stock-core-api

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: stock_db
          POSTGRES_USER: stock_user
          POSTGRES_PASSWORD: stock_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/stock_db
          SPRING_DATASOURCE_USERNAME: stock_user
          SPRING_DATASOURCE_PASSWORD: stock_pass
          SPRING_JPA_HIBERNATE_DDL_AUTO: update
          SPRING_JPA_SHOW_SQL: true
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          SERVER_PORT: 8080
          APP_AI_SERVER_URL: http://localhost:8000
          APP_JWT_SECRET: ci_test_secret_key_12345678901234567890
          APP_JWT_EXPIRATION: 3600000
          KIS_BASE_URL: https://openapi.koreainvestment.com:9443
          KIS_OAUTH_URL: https://openapi.koreainvestment.com:9443
          KIS_APPKEY: ci_test_key
          KIS_APPSECRET: ci_test_secret
          KIS_ACCOUNT_CANO: 12345678
          KIS_ACCOUNT_ACNT_PRDT_CD: 01
        run: ./gradlew test

      - name: Build JAR
        run: ./gradlew bootJar

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stock-core-api-jar
          path: BE/stock-core-api/build/libs/*.jar
          retention-days: 7

      # TODO: 추후 Option C (Docker Build + Push)
