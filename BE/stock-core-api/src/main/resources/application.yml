spring:
  application:
    name: stock-core-api
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
    show-sql: ${SPRING_JPA_SHOW_SQL}
    properties:
      hibernate:
        format_sql: true

  flyway:
    validate-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

server:
  port: ${SERVER_PORT}

# Custom Application Properties
app:
  ai-server:
    url: ${APP_AI_SERVER_URL}
    timeout: ${APP_AI_SERVER_TIMEOUT:5000}
  ai-trading:
    interval-ms: ${APP_AI_TRADING_INTERVAL_MS:60000}
  scheduler:
    enabled: ${APP_SCHEDULER_ENABLED:false}
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration: ${APP_JWT_EXPIRATION}

# KIS (Korea Investment Securities) Open API
kis:
  base-url: ${KIS_BASE_URL}
  oauth-url: ${KIS_OAUTH_URL}
  appkey: ${KIS_APPKEY}
  appsecret: ${KIS_APPSECRET}
  account:
    cano: ${KIS_ACCOUNT_CANO}
    acnt_prdt_cd: ${KIS_ACCOUNT_ACNT_PRDT_CD}
  websocket-url: ${KIS_WEBSOCKET_URL}
  mock-order-enabled: ${KIS_MOCK_ORDER_ENABLED:true}
  mock:
    base-url: ${KIS_MOCK_BASE_URL}
    oauth-url: ${KIS_MOCK_OAUTH_URL}
    appkey: ${KIS_MOCK_APPKEY}
    appsecret: ${KIS_MOCK_APPSECRET}
    account:
      cano: ${KIS_MOCK_ACCOUNT_CANO}
      acnt_prdt_cd: ${KIS_MOCK_ACCOUNT_ACNT_PRDT_CD:01}
    websocket-url: ${KIS_MOCK_WEBSOCKET_URL}

